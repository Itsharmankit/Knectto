<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="robots" content="noindex, nofollow">
	<title>Message Sent Successfully | Knectto</title>
	<link rel="icon" type="image/x-icon" href="favicon.ico">
	<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
	<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
	<link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
	<meta name="theme-color" content="#c8381e">
	<style>
		:root {
			--bg: #111315;
			--bg-soft: #1a1d21;
			--card: #171a1e;
			--card-border: #2a2f36;
			--text: #f3f5f7;
			--text-soft: #b5bcc5;
			--accent: #c8381e;
			--accent-hover: #dd4a2d;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html,
		body {
			width: 100%;
			min-height: 100%;
		}

		body {
			font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
			background:
				radial-gradient(1200px 500px at 10% -5%, rgba(200, 56, 30, 0.12), transparent 55%),
				radial-gradient(900px 400px at 100% 110%, rgba(200, 56, 30, 0.1), transparent 55%),
				linear-gradient(135deg, var(--bg) 0%, #0e1012 100%);
			color: var(--text);
			display: grid;
			place-items: center;
			padding: 1.25rem;
			opacity: 0;
			animation: fadeIn 600ms ease-out forwards;
		}

		.success-card {
			width: min(100%, 720px);
			background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent), var(--card);
			border: 1px solid var(--card-border);
			border-radius: 16px;
			padding: clamp(1.5rem, 3.8vw, 3rem);
			text-align: center;
			box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
		}

		.badge {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 58px;
			height: 58px;
			border-radius: 999px;
			background: rgba(200, 56, 30, 0.15);
			color: #ffd6cd;
			font-size: 1.5rem;
			margin-bottom: 1rem;
		}

		h1 {
			font-size: clamp(1.8rem, 5.2vw, 2.8rem);
			line-height: 1.15;
			letter-spacing: -0.02em;
			margin-bottom: 0.9rem;
		}

		p {
			color: var(--text-soft);
			font-size: clamp(1rem, 2.6vw, 1.08rem);
			line-height: 1.65;
			max-width: 56ch;
			margin: 0 auto;
		}

		.timer {
			margin-top: 1.2rem;
			color: #d6dbe2;
			font-size: 0.95rem;
		}

		.timer strong {
			color: #ffffff;
			font-variant-numeric: tabular-nums;
		}

		.actions {
			margin-top: 1.65rem;
			display: flex;
			justify-content: center;
		}

		.btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 0.85rem 1.4rem;
			border-radius: 10px;
			text-decoration: none;
			font-weight: 600;
			letter-spacing: 0.01em;
			color: #fff;
			background: var(--accent);
			border: 1px solid transparent;
			transition: background-color 0.2s ease, transform 0.2s ease;
		}

		.btn:hover {
			background: var(--accent-hover);
			transform: translateY(-1px);
		}

		.btn:focus-visible {
			outline: 3px solid rgba(200, 56, 30, 0.35);
			outline-offset: 2px;
		}

		.brand {
			margin-top: 1.3rem;
			font-size: 0.8rem;
			color: #97a0aa;
			letter-spacing: 0.05em;
			text-transform: uppercase;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 480px) {
			.success-card {
				border-radius: 14px;
			}

			.badge {
				width: 52px;
				height: 52px;
				font-size: 1.3rem;
			}
		}
	</style>
</head>
<body>
	<main class="success-card" role="main" aria-live="polite">
		<div class="badge" aria-hidden="true">✓</div>
		<h1>Thanks for Contacting Knectto</h1>
		<p>Your message has been received. We will get back to you within 24 hours.</p>

		<p class="timer">Redirecting to home in <strong id="countdown">5</strong> seconds...</p>

		<div class="actions">
			<a class="btn" href="index.html">Back to Home</a>
		</div>

		<div class="brand">Knectto</div>
	</main>

	<script>
		(function () {
			var seconds = 5;
			var countdownEl = document.getElementById('countdown');

			var timer = setInterval(function () {
				seconds -= 1;
				countdownEl.textContent = String(Math.max(seconds, 0));

				if (seconds <= 0) {
					clearInterval(timer);
					window.location.href = 'index.html';
				}
			}, 1000);
		})();
	</script>
</body>
</html>
